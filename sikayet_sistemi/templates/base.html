{% load static %}
<!doctype html>
<html lang="tr">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>{% block title %}Şikayet Sistemi{% endblock %}</title>
   <link rel="stylesheet" href="{% static 'dist/output.css' %}">
   <style>
      :root {
         --color-primary: #40513b;
         --color-secondary: #628141;
         --color-light: #e5d9b6;
         --color-accent: #e67e22;
         --bg: #f7f4ea;
         --card: #fffdf7;
         --text: #1f2a1d;
         --muted: #5e6b5a;
      }
   </style>
</head>
<body class="font-inter min-h-screen flex flex-col bg-gradient-to-bl from-bg to-light text-[var(--text)] ">

   <!-- Navbar -->
   <header class="fixed top-0 w-full z-50 bg-[var(--color-primary)] shadow">
      <div class="container mx-auto flex justify-between items-center py-4 px-4 md:px-0">
         <a href="/" class="text-white font-bold text-xl md:text-2xl">Şikayet Sistemi</a>
         <ul class="flex gap-6 text-white">
            <li><a href="#" class="hover:text-[var(--color-accent)] transition-colors">Ana Sayfa</a></li>
            <li><a href="#" class="hover:text-[var(--color-accent)] transition-colors">Şikayetler</a></li>
            <li><a href="#" class="hover:text-[var(--color-accent)] transition-colors">Yeni Şikayet</a></li>
            <li><a href="#" class="hover:text-[var(--color-accent)] transition-colors">Giriş / Kayıt</a></li>
         </ul>
      </div>
   </header>

   <!-- Main Content -->
   <main class="flex-1 container mx-auto px-4 md:px-0 pt-28">
      {% block content %}{% endblock %}
   </main>

   <!-- Footer -->
   <footer class="bg-[var(--color-secondary)] text-white py-4 mt-8">
      <div class="container mx-auto text-center text-sm font-semibold">
         &copy; 2026 Şikayet Sistemi | Tüm Hakları Saklıdır
      </div>
   </footer>

   {% block extra_js %}{% endblock %}
</body>
</html>
