{% extends 'base.html' %}

{% block title %}Şifre Başarıyla Sıfırlandı | Şikayet Sistemi{% endblock %}

{% block content %}
<style>
   .wrap {
      max-width: 600px;
      margin: 0 auto;
   }
   .success-box {
      background: rgba(98, 129, 65, 0.08);
      border: 2px solid var(--color-secondary);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
   }
   .success-box h1 {
      color: var(--color-primary);
      margin: 0 0 12px;
   }
   .success-box p {
      color: var(--muted);
      margin: 8px 0;
      font-size: 0.95rem;
      line-height: 1.6;
   }
   .btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
      margin-top: 14px;
   }
   .btn-primary {
      background: var(--color-primary);
      color: #fff;
   }
</style>

<div class="wrap">
   <div class="success-box">
      <h1>✓ Şifre Sıfırlandı</h1>
      <p>Şifreniz başarıyla değiştirilmiştir.</p>
      <p>Yeni şifrenizle giriş yapabilirsiniz.</p>
      <a class="btn btn-primary" href="{% url 'login' %}">Giriş Yap</a>
   </div>
</div>
{% endblock %}
